name: Build and deploy Node.js app to Azure Web App - mini-tache

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # 🔥 FRONTEND
      - name: Install frontend dependencies
        run: |
          echo "📦 Installing frontend dependencies..."
          npm ci --legacy-peer-deps
          echo "✅ Frontend dependencies installed"
          npm list --depth=0 2>/dev/null | head -20
        working-directory: frontend

      - name: Build frontend
        run: |
          echo "🔨 Building frontend..."
          npm run build
          echo "✅ Frontend build completed - checking output:"
          ls -la build/ | head -15
        working-directory: frontend

      - name: Verify frontend build
        run: |
          echo "Checking if frontend/build exists..."
          if [ -d "frontend/build" ]; then
            echo "✅ frontend/build exists"
            ls -la frontend/build | head -10
          else
            echo "❌ ERROR: frontend/build was not created!"
            echo "Frontend directory contents:"
            ls -la frontend/
            echo "Node version:"
            node --version
            npm --version
            exit 1
          fi

      # 🔥 BACKEND
      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend

      # 🔥 Préparer package final pour Azure
      - name: Prepare deployment package
        run: |
          echo "📦 Starting deployment package preparation..."
          
          # Lister le répertoire courant
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          
          # Vérifier que le build frontend existe
          if [ ! -d "frontend/build" ]; then
            echo "❌ ERROR: frontend/build does not exist!"
            echo "frontend directory contents:"
            ls -la frontend/
            exit 1
          fi
          
          echo "✅ frontend/build confirmed to exist"
          
          # Créer répertoire de déploiement
          mkdir -p deploy
          
          # Copier backend
          echo "📋 Copying backend files..."
          cp -r backend/* deploy/
          
          # Copier build frontend comme dossier public
          echo "🎨 Copying frontend build as public folder..."
          cp -r frontend/build deploy/public
          
          echo "✅ Deployment package prepared"
          echo "Deploy directory contents:"
          ls -la deploy/

      # 🔥 Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36B0F6415F3E445FA86CCB58D245FE25 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A49E7A23808409FAFEF655F68A5DF96 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_52E6B8A7299148FD9DCB1C9032A765BA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mini-tache'
          slot-name: 'Production'
          package: .