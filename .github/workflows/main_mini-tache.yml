name: Build and deploy Node.js app to Azure Web App - mini-tache

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 FRONTEND
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build
        run: |
          if [ ! -d "frontend/build" ]; then
            echo "❌ frontend/build not found"
            exit 1
          fi

      # 🔥 BACKEND
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps

      # 🔥 PREPARE DEPLOY
      - name: Prepare deployment package
        run: |
          mkdir -p deploy

          # backend
          cp -a backend/. deploy/

          # ⚠️ IMPORTANT FIX
          mkdir -p deploy/frontend
          cp -a frontend/build deploy/frontend/

          echo "Structure finale :"
          ls -R deploy

      # 🔥 ARTIFACT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36B0F6415F3E445FA86CCB58D245FE25 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A49E7A23808409FAFEF655F68A5DF96 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_52E6B8A7299148FD9DCB1C9032A765BA }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mini-tache'
          package: deploy