name: Build and deploy Node.js app to Azure Web App - mini-tache

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # 🔥 FRONTEND
      - name: Install frontend dependencies
        run: |
          echo "Installing frontend dependencies..."
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            echo "No frontend package-lock.json found, using npm install"
            npm install --legacy-peer-deps
          fi
        working-directory: frontend

      - name: Build frontend
        run: |
          echo "Building frontend..."
          npm run build
          ls -la build | head -15
        working-directory: frontend

      - name: Verify frontend build
        run: |
          echo "Checking if frontend/build exists..."
          if [ -d "frontend/build" ]; then
            echo "frontend/build exists"
            ls -la frontend/build | head -10
          else
            echo "ERROR: frontend/build was not created"
            echo "frontend directory contents:"
            ls -la frontend/
            echo "node/npm versions:"
            node --version
            npm --version
            exit 1
          fi

      # 🔥 BACKEND
      - name: Install backend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            echo "No backend package-lock.json found, using npm install"
            npm install --legacy-peer-deps
          fi
        working-directory: backend

      # 🔥 Préparer package final pour Azure
      - name: Prepare deployment package
        run: |
          echo "Preparing deployment package..."

          if [ ! -d "frontend/build" ]; then
            echo "ERROR: frontend/build does not exist"
            echo "frontend directory contents:"
            ls -la frontend/
            exit 1
          fi

          mkdir -p deploy

          # Copy backend app files
          cp -a backend/. deploy/

          # Copy frontend production build to public/
          mkdir -p deploy/public
          cp -a frontend/build/. deploy/public/

          echo "Deployment package prepared"
          ls -la deploy/

      # 🔥 Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36B0F6415F3E445FA86CCB58D245FE25 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A49E7A23808409FAFEF655F68A5DF96 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_52E6B8A7299148FD9DCB1C9032A765BA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mini-tache'
          slot-name: 'Production'
          package: deploy