name: Build and deploy Node.js app to Azure Web App - mini-tache

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Node 20 (important)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 INSTALL FRONTEND
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # 🔥 BUILD FRONTEND
      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # 🔍 VERIFY BUILD
      - name: Verify frontend build
        run: |
          echo "Checking frontend build..."
          ls -la frontend/build
          if [ ! -f "frontend/build/index.html" ]; then
            echo "ERROR: index.html not found"
            exit 1
          fi

      # 🔥 INSTALL BACKEND
      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      # 🔥 PREPARE DEPLOYMENT PACKAGE
      - name: Prepare deployment package
        run: |
          echo "Preparing deployment..."

          mkdir deploy

          # Backend
          cp -r backend deploy/backend

          # Frontend build (IMPORTANT 🔥)
          mkdir -p deploy/frontend
          cp -r frontend/build deploy/frontend/build

          # Root package.json
          cp package.json deploy/

          echo "Final structure:"
          ls -R deploy

      # 🔍 VERIFY DEPLOYMENT STRUCTURE
      - name: Verify deployment structure
        run: |
          if [ ! -f "deploy/package.json" ]; then
            echo "ERROR: deploy/package.json missing"
            exit 1
          fi

          if [ ! -f "deploy/backend/server.js" ]; then
            echo "ERROR: deploy/backend/server.js missing"
            exit 1
          fi

          if [ ! -f "deploy/frontend/build/index.html" ]; then
            echo "ERROR: deploy/frontend/build/index.html missing"
            exit 1
          fi

          echo "Deployment structure is valid"

      # 📦 CREATE ZIP PACKAGE (stable root for Azure)
      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../deploy.zip .
          cd ..
          ls -lh deploy.zip

      # 📦 UPLOAD ARTIFACT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Verify downloaded artifact
        run: |
          ls -la
          if [ ! -f "deploy.zip" ]; then
            echo "ERROR: deploy.zip missing after download"
            exit 1
          fi
          unzip -l deploy.zip | head -n 50

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36B0F6415F3E445FA86CCB58D245FE25 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A49E7A23808409FAFEF655F68A5DF96 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_52E6B8A7299148FD9DCB1C9032A765BA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mini-tache'
          package: deploy.zip